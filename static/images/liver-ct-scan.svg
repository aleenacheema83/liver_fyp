<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Medical CT Scan Background -->
  <rect width="400" height="300" fill="#f0f4f8"/>
  
  <!-- CT Scan Frame -->
  <rect x="30" y="30" width="340" height="240" fill="#ffffff" rx="8" stroke="#2d7a7a" stroke-width="2"/>
  
  <!-- Scan Grid Lines -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e2e8f0" stroke-width="0.5" opacity="0.5"/>
    </pattern>
  </defs>
  <rect x="30" y="30" width="340" height="240" fill="url(#grid)"/>
  
  <!-- Liver Outline -->
  <path d="M 100 100 Q 130 85 160 95 T 220 105 Q 240 115 230 145 Q 220 175 180 185 Q 140 195 120 175 Q 100 155 100 100 Z" 
        fill="#2d7a7a" opacity="0.3" stroke="#1a365d" stroke-width="2"/>
  
  <!-- Tumor Areas (Segmented) -->
  <circle cx="180" cy="130" r="18" fill="#38a169" opacity="0.7" stroke="#1a365d" stroke-width="1.5"/>
  <circle cx="220" cy="150" r="15" fill="#38a169" opacity="0.7" stroke="#1a365d" stroke-width="1.5"/>
  <ellipse cx="160" cy="160" rx="12" ry="18" fill="#1a365d" opacity="0.6" stroke="#2d7a7a" stroke-width="1.5"/>
  
  <!-- Scan Lines Effect -->
  <line x1="30" y1="80" x2="370" y2="80" stroke="#2d7a7a" stroke-width="1" opacity="0.2" stroke-dasharray="5,5"/>
  <line x1="30" y1="120" x2="370" y2="120" stroke="#2d7a7a" stroke-width="1" opacity="0.2" stroke-dasharray="5,5"/>
  <line x1="30" y1="160" x2="370" y2="160" stroke="#2d7a7a" stroke-width="1" opacity="0.2" stroke-dasharray="5,5"/>
  <line x1="30" y1="200" x2="370" y2="200" stroke="#2d7a7a" stroke-width="1" opacity="0.2" stroke-dasharray="5,5"/>
  
  <!-- Medical Label -->
  <rect x="30" y="30" width="340" height="30" fill="#1a365d" opacity="0.9"/>
  <text x="200" y="50" font-family="Inter, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="600">LIVER CT SCAN - AXIAL VIEW</text>
  
  <!-- Scale Indicator -->
  <line x1="320" y1="240" x2="350" y2="240" stroke="#1a365d" stroke-width="2"/>
  <text x="335" y="255" font-family="Inter, sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">5cm</text>
</svg>
